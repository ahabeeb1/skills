# habeebs-skill — Codex CLI hook registration (dual-native parity, 2026-06-25).
#
# Codex's hooks engine uses the same event schema as Claude Code's hooks.json
# (stable since Codex v0.124.0). This file registers the SAME six scripts under
# Codex that hooks/hooks.json registers under Claude Code — one script set, two
# registrations. The scripts self-locate their bundle root via
# hooks/lib/resolve-bundle-root.sh, so no harness-specific env var is needed.
#
# Matchers use Codex's regex dialect, anchored (^...$), matched against the
# reported `tool_name`. Codex reports `tool_name: "apply_patch"` for file edits
# (Edit/Write are accepted matcher aliases), and `tool_name: "Bash"` for shell
# calls — so the edit matchers list `apply_patch` first (the canonical name);
# `NotebookEdit` is a Claude-only tool and is intentionally omitted.
#
# KNOWN CODEX LIMITATION (openai/codex#16732): as of writing, Codex does NOT emit
# PreToolUse/PostToolUse events for file writes made through `apply_patch` — those
# events fire only for Bash/shell tool calls. So the Bash-matched commit-block
# guardrail below fires reliably on Codex; the Edit/Write-matched peer-scan and
# chain-state hooks are registered correctly but currently fire on Codex only for
# Bash-driven edits, until Codex closes #16732. On Claude Code all five fire.
#
# Path resolution: these commands assume the bundle is at the git repository root
# (the canonical layout, and how `.agents/skills/` discovery also works). For a
# vendored-at-subpath install, set CODEX_PLUGIN_ROOT and replace the
# `$(git rev-parse --show-toplevel)` prefix with "$CODEX_PLUGIN_ROOT".
#
# Honors HABEEBS_DISABLE_HOOKS=1 (emergency disable) and HABEEBS_SKIP=<hook>
# (per-invocation skip), identical to the Claude path.

# ── SessionStart: ghost-commit divergence warning ──────────────────────────────
[[hooks.SessionStart]]
[[hooks.SessionStart.hooks]]
type = "command"
command = 'bash "$(git rev-parse --show-toplevel)/hooks/session-start.sh"'
timeout = 10
statusMessage = "habeebs-skill: checking branch divergence"

# ── SessionStart: cross-session peer scan (warn-only) ──────────────────────────
[[hooks.SessionStart]]
[[hooks.SessionStart.hooks]]
type = "command"
command = 'bash "$(git rev-parse --show-toplevel)/hooks/session-start-peer-scan.sh"'
timeout = 10
statusMessage = "habeebs-skill: scanning for peer sessions"

# ── PreToolUse(Bash): block commits/pushes to the default branch ───────────────
[[hooks.PreToolUse]]
matcher = "^Bash$"
[[hooks.PreToolUse.hooks]]
type = "command"
command = 'bash "$(git rev-parse --show-toplevel)/hooks/preventing-commits-to-default.sh"'
timeout = 5
statusMessage = "habeebs-skill: guarding default branch"

# ── PreToolUse(apply_patch|Edit|Write): peer-overlap annotation (warn-only) ────
[[hooks.PreToolUse]]
matcher = "^(apply_patch|Edit|Write)$"
[[hooks.PreToolUse.hooks]]
type = "command"
command = 'bash "$(git rev-parse --show-toplevel)/hooks/pretool-use-peer-scan.sh"'
timeout = 10
statusMessage = "habeebs-skill: checking peer overlap"

# ── PostToolUse(apply_patch|Edit|Write): chain-state validator (warn-only) ─────
[[hooks.PostToolUse]]
matcher = "^(apply_patch|Edit|Write)$"
[[hooks.PostToolUse.hooks]]
type = "command"
command = 'bash "$(git rev-parse --show-toplevel)/hooks/check-chain-state.sh"'
timeout = 10
statusMessage = "habeebs-skill: validating chain state"
